name: Google Health Sync
version: "1.0.0"
slug: google_health_sync
description: Sync weight from HA → Google Health API → Fitbit
url: "https://github.com/YOURUSER/ha-google-health-sync"
arch:
  - aarch64
  - amd64
init: false
startup: services
boot: auto
host_network: false
ports:
  8766/tcp: 8766
ports_description:
  8766/tcp: HTTP endpoint Home Assistant calls
map:
  - share:rw
options:
  shared_secret: ""
  log_level: info
schema:
  shared_secret: str
  log_level: list(debug|info|warning|error)
